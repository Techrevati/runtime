site_name: Runtime
site_description: Runtime primitives for multi-step LLM agent loops (beta)
copyright: Copyright 2026 Techrevati doo

theme:
  name: null
  custom_dir: docs_theme

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            members_order: source
            merge_init_into_class: true
            separate_signature: true

hooks:
  - scripts/mkdocs_hooks/remove_generator_meta.py

extra:
  generator: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - End-to-End Tutorial: tutorials/end-to-end.md
  - Migrating from 0.0.x: migrating-from-0.0.x.md
