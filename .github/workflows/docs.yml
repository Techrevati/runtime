name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/install_toolchain.py docs

      - name: Build documentation
        # --strict turns broken refs and unresolved nav entries into
        # hard failures so a doc regression cannot silently degrade
        # the published site.
        run: mkdocs build --strict

      - name: Published HTML branding guard
        run: python scripts/check_public_branding.py site

  deploy:
    name: Deploy docs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docs
    permissions:
      contents: write

    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/install_toolchain.py docs

      - name: Build documentation
        run: mkdocs build --strict

      - name: Published HTML branding guard
        run: python scripts/check_public_branding.py site

      - name: Deploy documentation
        # peaceiris/actions-gh-pages v3
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
