name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Mondays — catches dependency-driven advisories
    # that land after a PR has already been merged.
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Initialize analysis
        # github/codeql-action v3
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # paths-ignore (tests) lives in the config file; the quality suite
          # false-positives on intentional negative-path test idioms.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        # github/codeql-action v3
        uses: github/codeql-action/autobuild@03e4368ac7daa2bd82b3e85262f3bf87ee112f57

      - name: Perform analysis
        # github/codeql-action v3
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57
        with:
          category: "/language:${{ matrix.language }}"
