name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate the release behind the same lint/type/test checks CI enforces
  # on `main`. Without this, a tag push could publish a broken wheel to
  # the package index even if CI was red on the underlying commit. Matrix mirrors
  # ci.yml so the gate has the same shape.
  verify:
    name: Verify on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/install_toolchain.py audit

      - name: Public branding guard
        run: python scripts/check_public_branding.py

      - name: Repository hygiene guard
        run: python scripts/check_repo_hygiene.py

      - name: Source hygiene guard
        run: python scripts/check_source_hygiene.py

      - name: Security pattern guard
        run: python scripts/check_security_patterns.py

      - name: Secret leak guard
        run: python scripts/check_secret_leaks.py

      - name: Security review guard
        run: python scripts/check_security_review.py

      - name: Package policy guard
        run: python scripts/check_package_policy.py

      - name: Public API guard
        run: python scripts/check_public_api.py

      - name: Documented public API guard
        run: python scripts/check_docs_public_api.py

      - name: Pre-commit config guard
        run: python scripts/check_precommit_config.py

      - name: CI guardrail guard
        run: python scripts/check_ci_guardrails.py

      - name: Guard calibration guard
        run: python scripts/check_guard_calibration.py

      - name: Dependency vulnerability guard
        run: python scripts/check_dependency_vulnerabilities.py

      - name: Final diff review guard
        run: python scripts/check_final_diff_review.py

      - name: RC review handoff guard
        run: python scripts/check_rc_review_handoff.py

      - name: Staging manifest guard
        run: python scripts/check_staging_manifest.py

      - name: Workflow action pinning guard
        run: python scripts/check_workflow_pinning.py

      - name: Workflow hardening guard
        run: python scripts/check_workflow_hardening.py

      - name: Release workflow guard
        run: python scripts/check_release_workflow.py

      - name: Release evidence guard
        run: python scripts/check_release_evidence.py

      - name: RC readiness guard
        run: python scripts/check_rc_readiness.py

      - name: Stable promotion guard
        run: python scripts/check_stable_promotion.py

      - name: Docs publication guard
        run: python scripts/check_docs_publication.py

      - name: Rollback execution guard
        run: python scripts/check_rollback_execution.py

      - name: Operations runbook guard
        run: python scripts/check_operations_runbook.py

      - name: Pilot dry-run guard
        run: python scripts/check_pilot_dry_run.py

      - name: Pilot evidence guard
        run: python scripts/check_pilot_evidence.py

      - name: Pilot execution guard
        run: python scripts/check_pilot_execution.py

      - name: Private RC publication guard
        run: python scripts/check_private_rc_publication.py

      - name: Maintenance automation guard
        run: python scripts/check_maintenance.py

      - name: Python support guard
        run: python scripts/check_python_support.py

      - name: Remote CI validation guard
        run: python scripts/check_remote_ci_validation.py

      - name: Toolchain pin guard
        run: python scripts/check_toolchain_pins.py

      - name: Version consistency guard
        run: python scripts/check_version_consistency.py

      - name: Changelog version guard
        run: python scripts/check_changelog.py

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Format check with ruff
        run: ruff format --check src/ tests/ scripts/

      - name: Type check with mypy
        run: mypy src/ --strict

      - name: Run tests
        run: pytest tests/ -v --cov=src/techrevati --cov-report=term-missing

      - name: Per-module coverage floor (>= 88%)
        run: python scripts/check_module_coverage.py --threshold 88

  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    permissions:
      # contents: write so the release action can create the release.
      contents: write

    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Check release tag
        run: python scripts/check_release_tag.py

      - name: Changelog version guard
        run: python scripts/check_changelog.py

      - name: Install build tools
        # cyclonedx-py is dev-only here — it generates the SBOM
        # artifact and never touches the runtime install.
        run: |
          python -m pip install --upgrade pip
          python scripts/install_toolchain.py release

      - name: Build distribution
        run: python -m build

      - name: Check distribution artifacts
        run: python scripts/check_distribution.py dist

      - name: Check package metadata rendering
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Stage package artifacts
        # Keep package uploads strictly to wheel + sdist. The SBOM lives
        # alongside the release artifacts but never lands on the index.
        run: |
          mkdir -p private-package-dist
          cp dist/*.whl dist/*.tar.gz private-package-dist/

      - name: Check staged private package artifacts
        run: |
          python scripts/check_distribution.py private-package-dist
          python -m twine check private-package-dist/*.whl private-package-dist/*.tar.gz

      - name: Generate CycloneDX SBOM
        # SBOM describes the build's dependency graph at publish time.
        # Trusted-publishing attestations + this SBOM together
        # give downstream consumers everything they need to verify
        # provenance (see SECURITY.md for the verify command).
        run: |
          pip install --force-reinstall --no-index --no-deps --find-links dist techrevati-runtime
          python -c "
          import importlib.metadata
          from techrevati import runtime
          assert runtime.__version__ == importlib.metadata.version('techrevati-runtime')
          "
          cyclonedx-py environment --output-format json --output-file dist/sbom.cyclonedx.json
          cyclonedx-py environment --output-format xml  --output-file dist/sbom.cyclonedx.xml

      - name: Generate artifact checksums
        # SHA256SUMS binds the wheel, sdist, and SBOM files into one
        # auditable evidence set for pilot and stable promotion review.
        run: |
          cd dist
          sha256sum *.whl *.tar.gz sbom.cyclonedx.json sbom.cyclonedx.xml > SHA256SUMS

      - name: Verify release evidence
        run: python scripts/check_release_evidence.py dist

      - name: Check private package repository configuration
        id: private_registry
        env:
          PRIVATE_PACKAGE_REPOSITORY_URL: ${{ secrets.PRIVATE_PACKAGE_REPOSITORY_URL }}
          PRIVATE_PACKAGE_USERNAME: ${{ secrets.PRIVATE_PACKAGE_USERNAME }}
          PRIVATE_PACKAGE_PASSWORD: ${{ secrets.PRIVATE_PACKAGE_PASSWORD }}
        # Private index is an OPTIONAL channel: publish there only when all
        # three secrets are configured. When they are not, skip the private
        # publish and let the repository pre-release be the controlled artifact
        # channel (the project's established mechanism for pre-releases).
        run: |
          if test -n "$PRIVATE_PACKAGE_REPOSITORY_URL" \
             && test -n "$PRIVATE_PACKAGE_USERNAME" \
             && test -n "$PRIVATE_PACKAGE_PASSWORD"; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Private registry secrets unset — skipping private publish; the repository pre-release is the controlled channel."
          fi

      - name: Publish private package
        if: steps.private_registry.outputs.configured == 'true'
        # pypa/gh-action-pypi-publish release/v1
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: private-package-dist
          repository-url: ${{ secrets.PRIVATE_PACKAGE_REPOSITORY_URL }}
          user: ${{ secrets.PRIVATE_PACKAGE_USERNAME }}
          password: ${{ secrets.PRIVATE_PACKAGE_PASSWORD }}

      - name: Create release
        # softprops/action-gh-release v1
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cyclonedx.json
            dist/sbom.cyclonedx.xml
            dist/SHA256SUMS
